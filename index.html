  <style>
    /* 字體＋置中 */
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      text-align: center;
      background: #f9fafb;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { color: #1e3a8a; margin: 6px 0 2px; }

    /* 搜尋、下拉 */
    .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 8px 0 14px; }
    #search-box {
      margin: 0;
      padding: 10px 12px;
      font-size: 16px;
      width: 260px;
      border: 2px solid #6d84d1;
      border-radius: 10px;
      background-color: #fff;
      color: #333;
      transition: all .2s ease;
    }
    #search-box:focus {
      outline: none;
      border-color: #3a57d1;
      box-shadow: 0 0 6px rgba(58,87,209,.35);
    }
    #floor-select {
      margin: 0;
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #8095da;
      background-color: #fff;
      color: #333;
      transition: border-color .2s ease;
    }
    #floor-select:focus { outline: none; border-color: #3a57d1; }

    /* 外層容器可橫向滑動 */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* 表格樣式 */
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px; /* 需要時再橫向滑動 */
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: center;
      white-space: nowrap; /* 防換行，讓橫向滑動 */
      background: #fff;
      font-size: 16px;
    }

    /* 表頭固定 */
    thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: #1e3a8a;
      color: #fff;
    }

    /* 最左欄固定（與表頭同底色） */
td:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
  background: #fff; /* 白底 */
  color: #000;      /* 黑字 */
  box-shadow: 1px 0 0 rgba(0, 0, 0, 0.05);
}

    
    /* 滑過整列變色 */
    tbody tr:hover { background: #a9b4d6; }

    /* 手機字級微調 */
    @media (max-width: 480px) {
      th, td { font-size: 14px; }
      #search-box { width: 220px; }
    }
  </style>

  // === 🔹 Step 2: 搜尋與顯示邏輯 ===
  const searchBox = document.getElementById('search-box');
  const floorSelect = document.getElementById('floor-select');
  const resultBody = document.getElementById('result-body');

  function renderTable(filterText = "", selectedFloor = "") {
    resultBody.innerHTML = "";
    const keyword = filterText.trim().toLowerCase();

    const filtered = data.filter(row => {
      const matchFloor = selectedFloor === "" || row["樓層"] === selectedFloor;
      const matchKeyword = Object.values(row).some(v =>
        v.toLowerCase().includes(keyword)
      );
      return matchFloor && matchKeyword;
    });

    filtered.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row["樑編號"]}</td>
        <td>${row["樓層"]}</td>
        <td>${row["頁碼"]}</td>
        <td>${row["樑尺寸"]}</td>
        <td>${row["上層主筋"]}</td>
        <td>${row["下層主筋"]}</td>
        <td>${row["加鐵長"]}</td>
        <td>${row["箍筋"]}</td>
        <td>${row["腰筋"]}</td>
        <td>${row["搭接"]}</td>
        <td>${row["延伸"]}</td>
      `;
      resultBody.appendChild(tr);
    });
  }

  searchBox.addEventListener("input", () => {
    renderTable(searchBox.value, floorSelect.value);
  });
  floorSelect.addEventListener("change", () => {
    renderTable(searchBox.value, floorSelect.value);
  });

  renderTable(); // 初始顯示全部
  </script>
